<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TimeBank Showdown</title>

<style>
body {
font-family: Arial, sans-serif;
background: linear-gradient(135deg, #1a1a2e, #16213e);
color: white;
text-align: center;
margin: 0;
}

header {
padding: 20px;
background: #0f3460;
font-size: 28px;
font-weight: bold;
}

.sub {
font-size: 14px;
opacity: 0.8;
}

.container {
display: flex;
justify-content: center;
flex-wrap: wrap;
padding: 20px;
}

.team {
background: #1f4068;
padding: 15px;
margin: 10px;
border-radius: 12px;
width: 230px;
box-shadow: 0 0 10px rgba(0,0,0,0.4);
}

.balance {
font-size: 26px;
margin: 10px 0;
}

button {
margin: 4px;
padding: 8px;
border: none;
border-radius: 6px;
cursor: pointer;
font-size: 12px;
}

.loss { background:#e74c3c; color:white; }
.gain { background:#2ecc71; color:white; }
.invest { background:#3498db; color:white; }
.power { background:#f1c40f; color:black; }

#leaderboard {
margin: 20px;
font-size: 18px;
}

.admin-panel {
margin-top: 20px;
}

.admin-panel button {
background:#9b59b6;
color:white;
padding:10px;
}
</style>
</head>

<body>

<header>
💼 TimeBank Showdown
<div class="sub">Spend It. Invest It. Or Lose It.</div>
</header>

<h2>Team Dashboards</h2>
<div class="container" id="teams"></div>

<h2>🏆 Leaderboard</h2>
<div id="leaderboard"></div>

<div class="admin-panel">
<h2>🎮 Facilitator Controls</h2>
<button onclick="chaos()">🎲 Trigger Chaos</button>
<button onclick="resetGame()">🔄 Reset Game</button>
</div>

<script>
let teams = [
{name:"Blue", balance:25200, planned:false},
{name:"Green", balance:25200, planned:false},
{name:"Purple", balance:25200, planned:false},
{name:"Orange", balance:25200, planned:false}
];

function render(){
let html="";
teams.forEach((t,i)=>{
html+=`
<div class="team">
<h3>Team ${t.name}</h3>
<div class="balance">$${t.balance}</div>

<button class="loss" onclick="update(${i},-1000)">📅 Meeting </button>
<button class="loss" onclick="update(${i},-500)">📧 Email </button>
<button class="loss" onclick="update(${i},-300)">🔄 Switch Task </button>

<button class="gain" onclick="update(${i},1000)">🚫 Decline </button>
<button class="gain" onclick="update(${i},1200)">🤝 Delegate </button>

<button class="invest" onclick="update(${i},-2000)">📋 Plan </button>  
<button class="invest" onclick="update(${i},2500)">🧠 Focus </button>

<button class="power" onclick="sabotage(${i})">💣 Sabotage</button>
<button class="power" onclick="shield(${i})">🛡 Shield</button>
</div>`;
});
document.getElementById("teams").innerHTML=html;

let sorted=[...teams].sort((a,b)=>b.balance-a.balance);
let lb="";
sorted.forEach((t,i)=>{
lb+=`<p>${i+1}. Team ${t.name}: $${t.balance}</p>`;
});
document.getElementById("leaderboard").innerHTML=lb;
}

function update(i,amt){
teams[i].balance+=amt;
render();
}

function chaos(){
let events=[-500,-800,-300,1000,1500,-1200];
teams.forEach(t=>{
t.balance+=events[Math.floor(Math.random()*events.length)];
});
alert("💥 CHAOS HIT ALL TEAMS!");
render();
}

function sabotage(i){
let target=prompt("Enter team to sabotage:");
let team=teams.find(t=>t.name.toLowerCase()==target.toLowerCase());
if(team){
team.balance-=800;
teams[i].balance-=200;
alert("💣 Sabotage successful!");
render();
}
}

function shield(i){
teams[i].balance-=500;
alert("🛡 Shield active (ignore next interruption)");
render();
}

function resetGame(){
teams.forEach(t=>t.balance=25200);
render();
}

render();
</script>

</body>
</html>
